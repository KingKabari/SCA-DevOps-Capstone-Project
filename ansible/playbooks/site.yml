- name: Base infrastructure setup
  hosts: all
  become: true
  gather_facts: false
  roles:
    - common

- name: Post-bootstrap validation
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Confirm Python is ready
      ansible.builtin.debug:
        msg: "Python installed, continuing configuration"

- name: Configure web server (nginx)
  hosts: web
  become: true
  gather_facts: true
  roles:
    - web
